name: Metrics
on:
  schedule: [{cron: "0 18 * * *"}]  # daily, 04:00 AEST
  workflow_dispatch:
  push: {branches: ["main"]}

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Cukrus-directive
          template: classic
          base: header
          config_timezone: Australia/Sydney

          # Repo discovery
          repositories: 200
          repositories_forks: yes
          repositories_affiliations: owner, collaborator, organization_member

          # Commit attribution (add every email you've committed with)
          commits_authoring: YOUR_USERNAME, personal@email.com, other@email.com

          # Languages activity
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analysis_timeout: 30
          plugin_languages_sections: most-used, recently-used
          plugin_languages_limit: 8
          plugin_languages_details: percentage
          plugin_languages_ignored: html, css
          plugin_languages_recent_days: 30

          # Isometric commit calendar
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
