name: Coding activity stats
on:
  schedule: [{cron: "0 18 * * *"}]  # daily, 04:00 AEST
  workflow_dispatch:
  push: {branches: ["main"]}

permissions:
  contents: write

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate all-time-stats.svg
        env:
          GH_TOKEN: ${{ secrets.METRICS_TOKEN }}
          OWNER: Cukrus-directive
          AUTHORS: 'Cukrus-directive|mail4acc@gmail\.com'
        run: python3 scripts/alltime_stats.py --out all-time-stats.svg

      - name: Commit the SVG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add all-time-stats.svg
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "Update all-time-stats.svg [skip ci]"
            git pull --rebase --autostash origin main || true
            git push
          fi
